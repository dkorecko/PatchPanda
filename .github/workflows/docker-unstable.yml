name: Build and publish unstable Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"

concurrency:
  group: docker-unstable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for security attestations
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          file: ./Dockerfile
          push: true
          build-args: |
            RELEASE_VERSION=unstable-${{ github.sha }}
          tags: ghcr.io/${{ env.REPO_LC }}:unstable
          # 2026: Generate provenance and SBOM for better security scores
          provenance: true
          sbom: true

  test-multi-arch:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Ensure we see results for all architectures even if one fails
      matrix:
        arch: [amd64, arm64, arm/v7]
    steps:
      - name: Lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test image on ${{ matrix.arch }}
        run: |
          set -e
          echo "Starting smoke test for ${{ matrix.arch }}..."
          # Run container with 60s timeout. Exit code 124 (timeout) is treated as success.
          # This verifies migrations run and the web server starts listening.
          timeout 60s docker run --rm --platform linux/${{ matrix.arch }} \
            ghcr.io/${{ env.REPO_LC }}:unstable || [ $? -eq 124 ]
          echo "Successfully verified image startup for ${{ matrix.arch }}"